version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: cs_db
    environment:
      POSTGRES_DB: centro_soluciones
      POSTGRES_USER: cs_user
      POSTGRES_PASSWORD: cs_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cs_user -d centro_soluciones"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: cs_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app          # hot-reload en desarrollo
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
